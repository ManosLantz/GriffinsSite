# Griffins Rugby - Sveltia CMS configuration (drop-in for Decap/Netlify CMS).
# Labels are bilingual (Greek / English) and every field has an explicit hint
# telling the editor exactly what to write.

backend:
  name: github
  repo: ManosLantz/GriffinsSite
  branch: main
  base_url: https://sveltia-cms-auth.manosmanos256.workers.dev

# Branding + handy links on the login/editor screens.
logo_url: https://griffinsrugby.gr/images/logo.png
site_url: https://griffinsrugby.gr
display_url: https://griffinsrugby.gr

# Where uploaded images are stored in the repo (overridden per-field where needed).
media_folder: "images"
public_folder: "images"

locale: en

collections:
  # ---------------- PLAYERS ----------------
  - name: roster
    label: "👥 Παίκτες / Players"
    delete: false
    files:
      - name: players
        label: "Ρόστερ / Roster"
        file: "data/players.json"
        description: "Πρόσθεσε, άλλαξε ή σβήσε παίκτες. Ταξινομούνται μόνα τους αλφαβητικά με το αγγλικό όνομα και η κάρτα 'You / Εσύ' μένει πάντα τελευταία. / Add, edit or remove players; they auto-sort and the join card stays last."
        fields:
          - name: players
            label: "Παίκτες / Players"
            label_singular: "Παίκτη / Player"
            widget: list
            collapsed: true
            summary: "{{fields.nameEn}} ({{fields.position}})"
            fields:
              - { name: nameEn, label: "Όνομα στα Αγγλικά / Name (English)", widget: string, hint: "Ονοματεπώνυμο με λατινικούς χαρακτήρες. Π.χ. Giannis Geronimakis" }
              - { name: nameEl, label: "Όνομα στα Ελληνικά / Name (Greek)", widget: string, required: false, hint: "Το ίδιο όνομα στα ελληνικά. Π.χ. Γιάννης Γερωνυμάκης. Άφησέ το κενό αν γράφεται το ίδιο και στις δύο γλώσσες (ξένα ονόματα)." }
              - name: position
                label: "Θέση / Position"
                widget: select
                hint: "Διάλεξε θέση. Μένει στα Αγγλικά και στις δύο γλώσσες."
                options: ["Prop", "Hooker", "Lock", "Flanker", "Number 8", "Scrum Half", "Fly Half", "Centre", "Winger", "Full Back", "Back", "Forward"]
              - name: gender
                label: "Φύλο / Gender"
                widget: select
                hint: "Δεν φαίνεται στην ιστοσελίδα, μόνο για εσωτερική χρήση."
                options:
                  - { label: "Άντρας / Male", value: "M" }
                  - { label: "Γυναίκα / Female", value: "F" }
              - name: photo
                label: "Φωτογραφία / Photo"
                widget: image
                required: false
                media_folder: "/images/players"
                public_folder: "images/players"
                hint: "Προαιρετικό. Καθαρή ΚΑΘΕΤΗ φωτογραφία προσώπου (όρθια). Αν δεν βάλεις, δείχνει το σήμα της ομάδας."
              - { name: descriptionEn, label: "Λεπτομέρεια στα Αγγλικά / Description (English)", widget: text, required: false, hint: "ΠΡΟΑΙΡΕΤΙΚΟ. Παρατσούκλι, αγαπημένο φαγητό, ένα ρητό, ό,τι ταιριάζει. Στα Αγγλικά." }
              - { name: descriptionEl, label: "Λεπτομέρεια στα Ελληνικά / Description (Greek)", widget: text, required: false, hint: "Το ίδιο στα Ελληνικά. Άφησέ το κενό αν δεν χρειάζεται." }

  # ---------------- NEWS ----------------
  - name: news
    label: "📰 Νέα / News"
    delete: false
    files:
      - name: items
        label: "Νέα / News items"
        file: "data/news.json"
        description: "Το ΠΡΩΤΟ στη λίστα (πιο πάνω) είναι το βασικό: δείχνει μεγάλο στη σελίδα News και στην αρχική. Σύρε για αναδιάταξη. / The top item is featured on the News page and the home page."
        fields:
          - name: items
            label: "Νέα / News items"
            label_singular: "Νέο / News item"
            widget: list
            collapsed: true
            summary: "{{fields.titleEn}}"
            fields:
              - { name: categoryEn, label: "Κατηγορία στα Αγγλικά / Category (English)", widget: string, hint: "Μικρή ετικέτα στα Αγγλικά. Π.χ. Announcement, Recruitment, Match, Club" }
              - { name: categoryEl, label: "Κατηγορία στα Ελληνικά / Category (Greek)", widget: string, required: false, hint: "Η ίδια ετικέτα στα Ελληνικά. Π.χ. Ανακοίνωση, Εγγραφές, Αγώνας, Σύλλογος" }
              - { name: titleEn, label: "Τίτλος στα Αγγλικά / Title (English)", widget: string, hint: "Σύντομος τίτλος στα Αγγλικά. Π.χ. Field Change!" }
              - { name: titleEl, label: "Τίτλος στα Ελληνικά / Title (Greek)", widget: string, required: false, hint: "Ο ίδιος τίτλος στα Ελληνικά. Π.χ. Αλλαγή γηπέδου!" }
              - { name: bodyEn, label: "Κείμενο στα Αγγλικά / Text (English)", widget: text, hint: "2-3 προτάσεις στα Αγγλικά. ΧΩΡΙΣ παύλες (—), βάλε κόμμα." }
              - { name: bodyEl, label: "Κείμενο στα Ελληνικά / Text (Greek)", widget: text, required: false, hint: "Το ίδιο κείμενο στα Ελληνικά. ΧΩΡΙΣ παύλες (—)." }
              - { name: image, label: "Φωτογραφία / Photo", widget: image, required: false, hint: "Ανέβασε μια ΟΡΙΖΟΝΤΙΑ (landscape) φωτογραφία για το νέο." }
              - { name: linkHref, label: "Κουμπί: σύνδεσμος / Button link", widget: string, required: false, hint: "ΠΡΟΑΙΡΕΤΙΚΟ. Πού πάει το κουμπί, π.χ. contact.html. Άφησέ το κενό αν δεν θες κουμπί." }
              - { name: linkEn, label: "Κουμπί: κείμενο στα Αγγλικά / Button text (English)", widget: string, required: false, hint: "Μόνο αν έβαλες σύνδεσμο. Π.χ. Join the squad" }
              - { name: linkEl, label: "Κουμπί: κείμενο στα Ελληνικά / Button text (Greek)", widget: string, required: false, hint: "Μόνο αν έβαλες σύνδεσμο. Π.χ. Έλα στην ομάδα" }

  # ---------------- GALLERY ----------------
  - name: gallery
    label: "📷 Φωτογραφίες / Gallery"
    delete: false
    files:
      - name: photos
        label: "Φωτογραφίες / Photos"
        file: "data/gallery.json"
        description: "Όλες οι φωτογραφίες του συλλόγου. Στην αρχική σελίδα φαίνονται οι 4 πρώτες, όλες μαζί στη σελίδα Gallery. / Home shows the first 4; all of them show on the Gallery page."
        fields:
          - name: photos
            label: "Φωτογραφίες / Photos"
            label_singular: "Φωτογραφία / Photo"
            widget: list
            collapsed: true
            summary: "{{fields.alt}}"
            fields:
              - { name: image, label: "Φωτογραφία / Photo", widget: image, hint: "Ανέβασε φωτογραφία από προπόνηση ή αγώνα." }
              - { name: alt, label: "Περιγραφή / Description", widget: string, hint: "Σύντομη περιγραφή στα Αγγλικά (για προσβασιμότητα και SEO). Π.χ. Griffins players training at Lido" }

  # ---------------- SUPPORTERS ----------------
  - name: supporters
    label: "🤝 Υποστηρικτές / Supporters"
    delete: false
    files:
      - name: supporters
        label: "Υποστηρικτές / Supporters"
        file: "data/supporters.json"
        description: "Άνθρωποι ή επιχειρήσεις που βοηθούν τον σύλλογο, εντός κι εκτός γηπέδου. / People or businesses who support the club."
        fields:
          - name: supporters
            label: "Υποστηρικτές / Supporters"
            label_singular: "Υποστηρικτή / Supporter"
            widget: list
            collapsed: true
            summary: "{{fields.name}}"
            fields:
              - { name: name, label: "Όνομα / Name", widget: string, hint: "Όνομα ατόμου ή επιχείρησης. Π.χ. Nikos Kritsotakis" }
              - { name: roleEn, label: "Ρόλος στα Αγγλικά / Role (English)", widget: string, required: false, hint: "Π.χ. Photographer, Sponsor, Friend of the club" }
              - { name: roleEl, label: "Ρόλος στα Ελληνικά / Role (Greek)", widget: string, required: false, hint: "Π.χ. Φωτογράφος, Χορηγός, Φίλος του συλλόγου" }
              - { name: textEn, label: "Ευχαριστίες στα Αγγλικά / Thank-you (English)", widget: text, required: false, hint: "Μια σύντομη ευχαριστία στα Αγγλικά." }
              - { name: textEl, label: "Ευχαριστίες στα Ελληνικά / Thank-you (Greek)", widget: text, required: false, hint: "Το ίδιο στα Ελληνικά." }
